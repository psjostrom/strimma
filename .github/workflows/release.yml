name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          STRIMMA_KEYSTORE_FILE: release.keystore
          STRIMMA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          STRIMMA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STRIMMA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/release/app-release.apk "strimma-${VERSION}.apk"

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          gh release create "${{ github.ref_name }}" \
            "strimma-${VERSION}.apk" \
            --generate-notes \
            --notes-start-tag "$PREV_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
