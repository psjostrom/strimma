# Detekt config for Strimma — medical CGM app
# Builds on default config (buildUponDefaultConfig = true)
# Only overrides where defaults need adjustment

complexity:
  CyclomaticComplexMethod:
    threshold: 15
    ignoreAnnotated: ['Composable']
  ComplexCondition:
    threshold: 5
  LongMethod:
    threshold: 60
    ignoreAnnotated: ['Composable']
  LongParameterList:
    functionThreshold: 7
    constructorThreshold: 7
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']
  NestedBlockDepth:
    threshold: 5

coroutines:
  active: true

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
  MatchingDeclarationName:
    mustBeFirst: false

performance:
  active: true

potential-bugs:
  active: true

style:
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreAnnotated: ['Composable']
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 140
    excludeCommentStatements: true
  ReturnCount:
    max: 4
    excludeGuardClauses: true
  LoopWithTooManyJumpStatements:
    maxJumpCount: 2
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.coroutines.*'
      - 'kotlinx.coroutines.flow.*'
      - 'androidx.compose.runtime.*'
      - 'androidx.compose.foundation.layout.*'
      - 'androidx.compose.material3.*'
      - 'androidx.glance.*'
      - 'androidx.glance.layout.*'
      - 'androidx.datastore.preferences.core.*'
      - 'android.graphics.*'
      - 'io.ktor.client.*'
      - 'io.ktor.client.call.*'
      - 'io.ktor.client.engine.cio.*'
      - 'io.ktor.client.plugins.contentnegotiation.*'
      - 'io.ktor.client.request.*'
      - 'io.ktor.client.statement.*'
      - 'io.ktor.http.*'
      - 'io.ktor.serialization.kotlinx.json.*'
      - 'io.ktor.server.application.*'
      - 'io.ktor.server.cio.*'
      - 'io.ktor.server.engine.*'
      - 'io.ktor.server.request.*'
      - 'io.ktor.server.response.*'
      - 'io.ktor.server.routing.*'
      - 'org.junit.Assert.*'
